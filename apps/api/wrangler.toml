name = "thepick-api"
main = "src/index.ts"
# compatibility_date 업데이트: 2024-01-01 → 2026-04-01 (2+년 보안/런타임 패치 반영)
# 변경 전 tests 통과 확인 (Session 8, 2026-04-18)
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# Default (local dev with miniflare/wrangler dev)
# ============================================================
# 주의: default env는 로컬 miniflare용. `wrangler dev` 사용 시 wrangler v4는
# database_id 필드 없이 local 시뮬레이터를 띄운다. `deploy --dry-run` 은 CI
# 빌드 검증용이며 실제 배포가 아니므로 placeholder database_id 허용.
[vars]
ENVIRONMENT = "development"
API_VERSION = "0.1.0"
# ------------------------------------------------------------
# Step 1-3 M-4 — dev 전용 webhook HMAC secret placeholder (≥32B)
# ------------------------------------------------------------
# 운영자 onboarding UX 개선: `wrangler dev` 즉시 webhook 테스트 가능.
# 프로덕션은 이 값을 절대 사용하지 말 것 — `wrangler secret put` 경유 주입.
# 길이 32바이트 미만이면 MIN_WEBHOOK_SECRET_BYTES 검증 실패로 500.
WEBHOOK_HMAC_SECRET_MOCK = "dev-mock-secret-do-not-use-in-production-v1"
WEBHOOK_HMAC_SECRET_POLAR = "dev-polar-secret-do-not-use-in-production-v1"
WEBHOOK_HMAC_SECRET_PORTONE = "dev-portone-secret-do-not-use-in-production-v1"
WEBHOOK_HMAC_SECRET_TOSSPAYMENTS = "dev-toss-secret-do-not-use-in-production-v1"
# ------------------------------------------------------------
# Step 1-4 M-4 — JWT + IP hash dev placeholder (≥32B)
# staging/production 은 `wrangler secret put JWT_SECRET --env <env>` 경유 주입.
# ------------------------------------------------------------
JWT_SECRET = "dev-jwt-secret-do-not-use-in-production-32chars+v1"
IP_PEPPER = "dev-ip-pepper-do-not-use-in-production-32chars+v1"

[[d1_databases]]
binding = "DB"
database_name = "thepick-db-dev"
database_id = "0000000000-0000-0000-0000-000000000000"  # miniflare local placeholder
migrations_dir = "../../migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "0000000000000000000000000000000000"  # miniflare local placeholder

[dev]
port = 8787
local_protocol = "http"
ip = "localhost"

[observability]
enabled = true
head_sampling_rate = 0.1  # dev는 10%만 기록 (CI/로컬 관측 비용 절감)

# Auth + Webhook Rate Limiting (Cloudflare Workers Rate Limit API — ADR-006 단일 벤더 준수)
# namespace_id 는 프로젝트 고유 (임의 int). limit/period 는 정책 명시.
# 환경별 namespace 분리 (Step 1-2 M-rate-limit-namespace 해소):
#   - dev      : 1001 / 1002 / 1003 (로컬 miniflare)
#   - staging  : 2001 / 2002 / 2003
#   - production: 3001 / 3002 / 3003
# 같은 namespace 공유 시 staging 자동화 테스트가 prod 카운터를 소모할 수 있음.
[[unsafe.bindings]]
name = "AUTH_RATE_LIMITER_IP"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "AUTH_RATE_LIMITER_EMAIL"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 600 }

# Step 1-2 C-1 — webhook DoS 방어 (HMAC 암호 연산 CPU 폭증 차단)
# 300 req/60s: PG 정상 트래픽 대비 여유, 공격자 단일 IP 기준 저지 가능
[[unsafe.bindings]]
name = "WEBHOOK_RATE_LIMITER_IP"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 300, period = 60 }

# ============================================================
# Staging (APAC) — remote D1
# DB id: edacc775-b11c-4200-8a76-284c65fa0542
# ============================================================
[env.staging]
name = "thepick-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
API_VERSION = "0.1.0"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "thepick-db-staging"
database_id = "edacc775-b11c-4200-8a76-284c65fa0542"
migrations_dir = "../../migrations"

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[[env.staging.unsafe.bindings]]
name = "AUTH_RATE_LIMITER_IP"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 20, period = 60 }

[[env.staging.unsafe.bindings]]
name = "AUTH_RATE_LIMITER_EMAIL"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 5, period = 600 }

[[env.staging.unsafe.bindings]]
name = "WEBHOOK_RATE_LIMITER_IP"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 300, period = 60 }

# ============================================================
# Production (APAC) — remote D1
# DB id: a9b8d521-dc99-46f7-835c-1f226cebdbf8
# ============================================================
[env.production]
name = "thepick-api-production"

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "0.1.0"

[[env.production.d1_databases]]
binding = "DB"
database_name = "thepick-db-production"
database_id = "a9b8d521-dc99-46f7-835c-1f226cebdbf8"
migrations_dir = "../../migrations"

[env.production.observability]
enabled = true
head_sampling_rate = 1

[[env.production.unsafe.bindings]]
name = "AUTH_RATE_LIMITER_IP"
type = "ratelimit"
namespace_id = "3001"
simple = { limit = 20, period = 60 }

[[env.production.unsafe.bindings]]
name = "AUTH_RATE_LIMITER_EMAIL"
type = "ratelimit"
namespace_id = "3002"
simple = { limit = 5, period = 600 }

[[env.production.unsafe.bindings]]
name = "WEBHOOK_RATE_LIMITER_IP"
type = "ratelimit"
namespace_id = "3003"
simple = { limit = 300, period = 60 }
