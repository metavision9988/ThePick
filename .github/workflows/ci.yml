name: CI

# Security note: 이 workflow는 신뢰할 수 없는 입력(${{ github.event.*.title/body }} 등)을 사용하지 않는다.
# 모든 run: 명령은 하드코딩되어 있고, 외부 action은 공식/검증된 것만 사용한다.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare Workers types
        run: pnpm --filter @thepick/api cf-typegen

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test (packages with tests)
        run: |
          pnpm --filter @thepick/shared \
               --filter @thepick/formula-engine \
               --filter @thepick/parser \
               --filter @thepick/quality \
               --filter @thepick/batch \
               --filter @thepick/api \
               test

      - name: Security audit (HIGH+ blocking, dev 포함)
        run: pnpm audit --audit-level=high

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
