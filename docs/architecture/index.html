<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; overflow: hidden; }
  nav { display: flex; gap: 2px; background: #161b22; padding: 8px 16px; border-bottom: 1px solid #30363d; align-items: center; }
  nav .logo { font-weight: 700; font-size: 15px; color: #58a6ff; margin-right: 16px; white-space: nowrap; }
  nav button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all .15s; white-space: nowrap; }
  nav button:hover { background: #30363d; }
  nav button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  #legend { position: absolute; top: 56px; right: 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; z-index: 10; font-size: 11px; max-width: 220px; }
  #legend h4 { margin-bottom: 8px; color: #58a6ff; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  #tooltip { position: absolute; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity .15s; max-width: 320px; z-index: 20; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  #tooltip .tt-title { color: #58a6ff; margin-bottom: 4px; font-size: 13px; font-weight: 600; }
  #tooltip .tt-desc { color: #8b949e; line-height: 1.5; white-space: pre-line; }
  #tooltip .tt-tag { display: inline-block; background: #30363d; padding: 1px 6px; border-radius: 4px; font-size: 10px; margin-top: 4px; }
  #tooltip .tt-tag-l3 { background: #6e1b1b; color: #f85149; }
  #info { position: absolute; bottom: 16px; left: 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 16px; font-size: 11px; color: #8b949e; z-index: 10; }
  #info kbd { background: #30363d; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
  svg { width: 100%; height: calc(100vh - 45px); }
  .link { stroke-opacity: 0.5; fill: none; }
  .link-label { font-size: 9px; fill: #6e7681; pointer-events: none; }
  .node-label { font-size: 11px; fill: #c9d1d9; pointer-events: none; text-anchor: middle; font-weight: 500; }
  .node-sublabel { font-size: 9px; fill: #6e7681; pointer-events: none; text-anchor: middle; }
</style>
</head>

// ─── Render Engine ───
let sim = null;

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    render(this.dataset.view);
  });
});

function render(view) {
  const data = VIEWS[view];
  const nodes = data.nodes.map(d => Object.assign({}, d));
  const links = data.links.map(d => Object.assign({}, d));

  const svg = d3.select('#canvas');
  svg.selectAll('*').remove();

  // Legend
  const leg = document.getElementById('legend');
  leg.textContent = '';
  const h4 = document.createElement('h4');
  h4.textContent = view.toUpperCase();
  leg.appendChild(h4);
  data.legend.forEach(l => {
    const row = document.createElement('div');
    row.className = 'legend-item';
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = l.color;
    const txt = document.createTextNode(l.label);
    row.appendChild(dot);
    row.appendChild(txt);
    leg.appendChild(row);
  });

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(0.85));

  // Arrows
  const defs = svg.append('defs');
  ['n','d'].forEach(t => {
    defs.append('marker').attr('id','a-'+t)
      .attr('viewBox','0 -5 10 10').attr('refX',20).attr('refY',0)
      .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',t==='d'?'#484f58':'#6e7681');
  });

  if (sim) sim.stop();
  sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(120).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('x', d3.forceX(d => d.x||0).strength(0.15))
    .force('y', d3.forceY(d => d.y||0).strength(0.15))
    .force('collision', d3.forceCollide().radius(d => (d.size||14)+20));

  const link = g.selectAll('.link').data(links).join('line')
    .attr('class','link')
    .attr('stroke', d => d.dash?'#484f58':'#6e7681')
    .attr('stroke-width', d => d.dash?1:1.5)
    .attr('stroke-dasharray', d => d.dash?'6,4':null)
    .attr('marker-end', d => 'url(#a-'+(d.dash?'d':'n')+')');

  const linkLabel = g.selectAll('.link-label').data(links.filter(d=>d.label)).join('text')
    .attr('class','link-label').text(d=>d.label);

  const node = g.selectAll('.node').data(nodes).join('g').attr('class','node')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);}));

  node.append('circle')
    .attr('r', d=>d.size||14)
    .attr('fill', d=>C[d.group]||'#6e7681')
    .attr('stroke', d=>d3.color(C[d.group]||'#6e7681').brighter(0.6))
    .attr('stroke-width',2).attr('opacity',0.9);

  node.append('text').attr('class','node-label').attr('dy',d=>-(d.size||14)-8).text(d=>d.label);
  node.append('text').attr('class','node-sublabel').attr('dy',d=>(d.size||14)+14).text(d=>(d.sub||'').split('\n')[0]);

  // Tooltip (safe: textContent only, no user input)
  const tt = document.getElementById('tooltip');
  const ttTitle = tt.querySelector('.tt-title');
  const ttDesc = tt.querySelector('.tt-desc');
  const ttTag = tt.querySelector('.tt-tag');

  node.on('mouseover', (e,d)=>{
    ttTitle.textContent = d.label;
    ttDesc.textContent = d.sub || '';
    ttTag.textContent = d.group;
    ttTag.className = 'tt-tag' + (d.sub && d.sub.includes('L3') ? ' tt-tag-l3' : '');
    tt.style.opacity=1;
    tt.style.left=(e.pageX+12)+'px';
    tt.style.top=(e.pageY-10)+'px';
    d3.select(e.currentTarget).select('circle').transition().duration(150).attr('r',(d.size||14)*1.3);
  }).on('mousemove',(e)=>{
    tt.style.left=(e.pageX+12)+'px';
    tt.style.top=(e.pageY-10)+'px';
  }).on('mouseout',(e,d)=>{
    tt.style.opacity=0;
    d3.select(e.currentTarget).select('circle').transition().duration(150).attr('r',d.size||14);
  });

  node.on('click',(e,d)=>{
    d.fx=d.fx?null:d.x; d.fy=d.fy?null:d.y;
    d3.select(e.currentTarget).select('circle')
      .attr('stroke-width',d.fx?4:2)
      .attr('stroke',d.fx?'#fff':d3.color(C[d.group]).brighter(0.6));
  });

  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    linkLabel.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2-6);
    node.attr('transform',d=>'translate('+d.x+','+d.y+')');
  });
}

render('system');
</script>
</body>
</html>
